    description: Flux reconcile
    scopes:
      - resourcesets
    command: flux-operator
    background: false
    args:
      - reconcile
      - rset
      - --kube-context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-inputprovider:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile
    scopes:
      - resources
    command: flux-operator
    background: false
