  reconcile-git:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile
    scopes:
      - gitrepositories
    command: flux
    background: false
    args:
      - reconcile
      - source
      - git
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-hr:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile
    scopes:
      - helmreleases
    command: flux
    background: false
    args:
      - reconcile
      - helmrelease
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-helm-repo:
    shortCut: Shift-Z
    description: Flux reconcile
    scopes:
      - helmrepositories
    command: flux
    background: false
    confirm: false
    args:
      - reconcile
      - source
      - helm
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-oci-repo:
    shortCut: Shift-Z
    description: Flux reconcile
    scopes:
      - ocirepositories
    command: flux
    background: false
    confirm: false
    args:
      - reconcile
      - source
      - oci
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-ks:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile
    scopes:
      - kustomizations
    command: flux
    background: false
    args:
      - reconcile
      - kustomization
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-ir:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile
    scopes:
      - imagerepositories
    command: flux
    background: false
    args:
      - reconcile
      - image
      - repository
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
  reconcile-iua:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile
    scopes:
      - imageupdateautomations
    command: flux
    background: false
    args:
      - reconcile
      - image
      - update
      - --context=$CONTEXT
      - --namespace=$NAMESPACE
      - $NAME
